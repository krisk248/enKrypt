# enKrypt CI + release.
#   * every push / PR   → build & test the Rust core and the web app
#   * tag `v*`          → build a multi-arch container image and push to GHCR
#
# This uses standard GitHub Actions syntax and also runs on self-hosted Gitea
# Actions runners. To publish to a different registry (e.g. git.linhex.com),
# change `REGISTRY`/`IMAGE` and the login step's credentials.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm toolchain
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Generate GnuPG interop fixtures
        run: ./scripts/gen-fixtures.sh

      - name: Rust tests (crypto core, incl. GnuPG interop)
        working-directory: crypto-core
        run: cargo test

      - name: Build wasm
        # --out-dir is relative to the crate dir, so build from inside crypto-core.
        working-directory: crypto-core
        run: wasm-pack build --target web --release --out-dir ../web/src/wasm

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web install, type-check, test, build
        working-directory: web
        run: |
          npm ci
          npm run check
          npm test
          npm run build:fast

  image:
    # Only build/push the image for version tags.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
