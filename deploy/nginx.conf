# enKrypt static-file server config for nginxinc/nginx-unprivileged (uid 101).
# Serves the built SPA + wasm with correct MIME types, gzip, long-lived caching
# for hashed assets, and an SPA fallback. Everything is client-side; nginx only
# hands out files. No upstream, no proxying, no state.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    # Ensure WebAssembly is served with the correct MIME type (required for
    # streaming instantiation).
    types {
        application/wasm wasm;
    }
    default_type application/octet-stream;

    # Writable temp paths (non-root user cannot use the default /var/... paths).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path        /tmp/proxy_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # On-the-fly gzip, plus pre-compressed .gz files (built in the image).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml application/manifest+json;
    gzip_static on;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (defence in depth; the app also ships a strict CSP
        # meta tag). Using `expires` for caching below keeps these inherited.
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Resource-Policy same-origin always;

        # Content-hashed assets — cache hard.
        location /assets/ {
            expires 1y;
            try_files $uri =404;
        }

        # The service worker and entry HTML must never be cached staler than a
        # reload, so updates roll out immediately.
        location = /sw.js        { expires -1; }
        location = /index.html   { expires -1; }
        location = /registerSW.js { expires -1; }
        location = /manifest.webmanifest { expires 1h; }

        # SPA fallback.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
